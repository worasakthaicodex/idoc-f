spring:
  application:
    name: idoc

  datasource:
    # ตั้งค่าจริงผ่าน environment variables (Neon Postgres)
    url: ${DB_URL:jdbc:postgresql://localhost:5432/idoc}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}   # Neon free tier: pool เล็ก ๆ พอ

  jpa:
    hibernate:
      ddl-auto: validate        # schema จัดการโดย Flyway เท่านั้น ห้าม update อัตโนมัติ
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

# ที่เก็บไฟล์ (object storage) — default = ของจริง (firebase) เพื่อให้ prod ไม่รีเซ็ตกลับ dev เวลา env หาย
#   local dev: ตั้ง STORAGE_PROVIDER=dev ตอนรัน (mock ไม่ต้องมี Firebase credentials)
storage:
  provider: ${STORAGE_PROVIDER:firebase}
  quota-bytes: ${STORAGE_QUOTA_BYTES:5368709120}   # โควตา/บริษัท (default 5GB = Firebase Spark ฟรี) — ปรับตามแพ็กเกจ
  firebase:
    bucket: ${FIREBASE_BUCKET:idoc-3299c.firebasestorage.app}   # ของ prod เป็น default · credentials ใช้ ADC (Cloud Run SA)

server:
  port: ${PORT:8080}
  # บีบ gzip ตอบกลับ (JSON ของ /api/sales-docs, /api/calendar ฯลฯ ลดได้ ~80-90%)
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/plain,text/css,application/javascript
    min-response-size: 1024

# Spring Boot Admin server (de.codecentric) — ปิด security ของตัว actuator ไว้ก่อนช่วง dev
management:
  endpoints:
    web:
      exposure:
        include: health,info
